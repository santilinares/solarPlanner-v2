<div class="admin-dashboard animate-fade-in-up">
  <div class="dashboard-header">
    <div>
      <h1>
        <i class="pi pi-shield icon-lg" style="color: var(--red-500);"></i>
        Admin Dashboard
      </h1>
      <p class="welcome-text">System overview and management center</p>
    </div>
  </div>

  <div class="dashboard-grid stagger-children">
    <p-card class="stat-card hover-lift">
      <div class="stat-icon" style="background: rgba(211, 47, 47, 0.1);">
        <i class="pi pi-users icon-lg" style="color: var(--red-500);"></i>
      </div>
      <h3>Total Users</h3>
      <p class="stat-value">0</p>
      <p-button
        label="Manage Users"
        icon="pi pi-arrow-right"
        iconPos="right"
        routerLink="/admin/users"
        [text]="true"
        class="w-full mt-3"
      ></p-button>
    </p-card>

    <p-card class="stat-card hover-lift">
      <div class="stat-icon" style="background: rgba(45, 106, 79, 0.1);">
        <i class="pi pi-folder icon-lg" style="color: var(--primary-500);"></i>
      </div>
      <h3>Total Projects</h3>
      <p class="stat-value">0</p>
      <p-button
        label="Manage Projects"
        icon="pi pi-arrow-right"
        iconPos="right"
        routerLink="/admin/projects"
        [text]="true"
        class="w-full mt-3"
      ></p-button>
    </p-card>

    <p-card class="stat-card hover-lift">
      <div class="stat-icon" style="background: rgba(255, 214, 0, 0.15);">
        <i class="pi pi-th-large icon-lg" style="color: var(--yellow-500);"></i>
      </div>
      <h3>Panel Types</h3>
      <p class="stat-value">0</p>
      <p-button
        label="Manage Panels"
        icon="pi pi-arrow-right"
        iconPos="right"
        routerLink="/admin/panels"
        [text]="true"
        class="w-full mt-3"
      ></p-button>
    </p-card>
  </div>

  <p-card class="info-card mt-4">
    <div class="info-content">
      <i class="pi pi-info-circle icon-2xl" style="color: var(--primary-500);"></i>
      <div>
        <h3>Coming Soon</h3>
        <ul>
          <li>Real-time system statistics and analytics</li>
          <li>User activity logs and audit trail</li>
          <li>System health monitoring</li>
          <li>Advanced reporting and data export</li>
        </ul>
      </div>
    </div>
  </p-card>
</div>
