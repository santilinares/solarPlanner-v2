<div class="admin-dashboard animate-fade-in-up">
  <div class="dashboard-header">
    <div>
      <h1>
        <i class="pi pi-shield icon-lg icon-danger"></i>
        Admin Dashboard
      </h1>
      <p class="welcome-text">System overview and management center</p>
    </div>
  </div>

  <div class="dashboard-grid stagger-children">
    <p-card class="stat-card hover-lift">
      <div class="stat-icon stat-icon-danger">
        <i class="pi pi-users icon-lg icon-danger"></i>
      </div>
      <h3>Total Users</h3>
      <p class="stat-value">0</p>
      <p-button
        label="Manage Users"
        icon="pi pi-arrow-right"
        iconPos="right"
        routerLink="/projects/management/users"
        Content="true"
        class="w-full mt-3"
      ></p-button>
    </p-card>

    <p-card class="stat-card hover-lift">
      <div class="stat-icon stat-icon-primary">
        <i class="pi pi-folder icon-lg icon-primary"></i>
      </div>
      <h3>Total Projects</h3>
      <p class="stat-value">0</p>
      <p-button
        label="Manage Projects"
        icon="pi pi-arrow-right"
        iconPos="right"
        routerLink="/projects/management/projects"
        Content="true"
        class="w-full mt-3"
      ></p-button>
    </p-card>

    <p-card class="stat-card hover-lift">
      <div class="stat-icon stat-icon-solar">
        <i class="pi pi-th-large icon-lg icon-solar"></i>
      </div>
      <h3>Panel Types</h3>
      <p class="stat-value">0</p>
      <p-button
        label="Manage Panels"
        icon="pi pi-arrow-right"
        iconPos="right"
        routerLink="/projects/management/panels"
        Content="true"
        class="w-full mt-3"
      ></p-button>
    </p-card>
  </div>

  <p-card class="info-card mt-4">
    <div class="info-content">
      <i class="pi pi-info-circle icon-2xl icon-primary"></i>
      <div>
        <h3>Coming Soon</h3>
        <ul>
          <li>Real-time system statistics and analytics</li>
          <li>User activity logs and audit trail</li>
          <li>System health monitoring</li>
          <li>Advanced reporting and data export</li>
        </ul>
      </div>
    </div>
  </p-card>
</div>
